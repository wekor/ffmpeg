name: ios full xcframework (manual)

on:
  workflow_dispatch:
    inputs:
      enable_gpl:
        description: Include GPL libraries (adds --enable-gpl)
        required: false
        type: boolean
        default: false
      xcode_version:
        description: Xcode version to use (leave blank for runner default)
        required: false
        type: string
        default: '15.4'

jobs:
  build-ios-full:
    name: ios full xcframework
    runs-on: macos-14
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: prerequisites
        run: |
          brew install autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget gettext meson ninja ragel groff gtk-doc libtasn1 --overwrite

      - name: set up xcode (use runner default if requested version missing)
        env:
          XCODE_VERSION: ${{ inputs.xcode_version }}
        run: |
          if [ -n "$XCODE_VERSION" ]; then
            XCODE_PATH="/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
            if [ -d "$XCODE_PATH" ]; then
              echo "export DEVELOPER_DIR=$XCODE_PATH" > ~/.xcode.for.ffmpeg.kit.sh
            else
              echo "Xcode ${XCODE_VERSION} not found, using default $(xcode-select -p)"
              > ~/.xcode.for.ffmpeg.kit.sh
            fi
          fi

      - name: set artifact name
        run: |
          NAME="ios-full-xcframework"
          if [ "${{ inputs.enable_gpl }}" = "true" ]; then
            NAME="ios-full-gpl-xcframework"
          fi
          echo "ARTIFACT_NAME=$NAME" >> "$GITHUB_ENV"

      - name: build ios full xcframework
        env:
          GPL_FLAG: ${{ inputs.enable_gpl }}
        run: |
          set -e
          EXTRA_FLAGS=""
          if [ "$GPL_FLAG" = "true" ]; then
            EXTRA_FLAGS="--enable-gpl"
          fi

          PATH="/usr/local/opt/bison/bin:$PATH" XML_CATALOG_FILES="/usr/local/etc/xml/catalog" \
            ./ios.sh --xcframework --full ${EXTRA_FLAGS}

      - name: upload ios full xcframework
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            prebuilt/bundle-apple-xcframework-ios/*.xcframework
            prebuilt/bundle-apple-xcframework-ios/LICENSE*
          if-no-files-found: error

      - name: print build logs
        if: ${{ always() }}
        run: cat build.log

      - name: print ffbuild logs
        if: ${{ failure() }}
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'
